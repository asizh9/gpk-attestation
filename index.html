function parseTickets(text) {
    const lines = text.split(/\r?\n/);
    const tickets = [];
    let currentTicket = null;
    let currentQuestion = null;
    let collectingAnswer = false;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (line === '') continue;

        const ticketMatch = line.match(/^БИЛЕТ\s+(\d+)/i);
        if (ticketMatch) {
            if (currentTicket && currentTicket.questions.length > 0) {
                tickets.push(currentTicket);
            }
            currentTicket = { id: parseInt(ticketMatch[1]), questions: [] };
            currentQuestion = null;
            collectingAnswer = false;
            continue;
        }

        if (!currentTicket) continue;

        if (line.includes('?') && !line.startsWith('--') && !line.startsWith('Шины') && !line.startsWith('Положительная')) {
            if (currentQuestion && currentQuestion.answers.length > 0) {
                currentQuestion.answers = currentQuestion.answers.filter(a => a.trim() !== '');
                if (currentQuestion.answers.length > 0) {
                    currentTicket.questions.push(currentQuestion);
                }
            }
            currentQuestion = { q: line, answers: [], correct: [] };
            collectingAnswer = false;
            continue;
        }

        if (currentQuestion) {
            if (line === 'Правильный ответ') {
                if (collectingAnswer && currentQuestion.answers.length > 0) {
                    currentQuestion.correct.push(currentQuestion.answers.length - 1);
                }
                collectingAnswer = false;
                continue;
            } else if (line === 'Неправильный ответ') {
                collectingAnswer = false;
                continue;
            }

            if (line !== '' && !line.startsWith('===') && !line.startsWith('====') && !line.startsWith('БИЛЕТ')) {
                if (line.includes('?') && line.length < 150 && !currentQuestion.answers.length) {
                    if (currentQuestion.answers.length > 0) {
                        currentTicket.questions.push(currentQuestion);
                    }
                    currentQuestion = { q: line, answers: [], correct: [] };
                    collectingAnswer = false;
                    continue;
                }

                if (!collectingAnswer) {
                    if (line !== '') {
                        currentQuestion.answers.push(line);
                        collectingAnswer = true;
                    }
                } else {
                    if (line !== '') {
                        currentQuestion.answers[currentQuestion.answers.length - 1] += ' ' + line;
                    } else {
                        collectingAnswer = false;
                    }
                }
                continue;
            }
        }
    }

    if (currentQuestion && currentQuestion.answers.length > 0 && currentTicket) {
        currentTicket.questions.push(currentQuestion);
    }
    if (currentTicket && currentTicket.questions.length > 0) {
        tickets.push(currentTicket);
    }

    tickets.forEach(t => { t.questions = t.questions.slice(0, 10); });
    return tickets;
}

let testSet = [], currentQ = 0, score = 0, uName = "", uGroup = "";

    uName = document.getElementById('s-name').value.trim();
    uGroup = document.getElementById('s-group').value.trim();

    document.getElementById('auth-screen').classList.add('hidden');

    renderQ();
}

function renderQ() {
    const data = testSet[currentQ];
    document.getElementById('q-num').innerText = currentQ + 1;
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('bar').style.width = ((currentQ + 1) * 10) + '%';
    const list = document.getElementById('ans-list');
    list.innerHTML = '';

    data.answers.forEach((txt, i) => {
        const btn = document.createElement('button');
        btn.className = "ans-btn";
        btn.innerText = txt;
        btn.onclick = () => {
            document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

            if (data.correct.includes(i)) {
                btn.classList.add('correct-highlight');
                score++;
            } else {
                document.getElementById('main-body').classList.add('flash-red');
                setTimeout(() => document.getElementById('main-body').classList.remove('flash-red'), 300);
                btn.classList.add('wrong-highlight');
                data.correct.forEach(idx => {
                    document.querySelectorAll('.ans-btn')[idx].classList.add('correct-highlight');
                });
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < 10) renderQ(); else finish();
            }, 1000);
        };
        list.appendChild(btn);
    });
}

function finish() {
    document.getElementById('quiz-screen').classList.add('hidden');
