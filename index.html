let testSet = [], currentQ = 0, score = 0, uName = "", uGroup = "";

function startQuiz() {
    uName = document.getElementById('s-name').value.trim();
    uGroup = document.getElementById('s-group').value.trim();
    if (uName.length < 3 || uGroup.length < 2) return alert("Введите ФИО и группу!");

    if (!ticketsData.length) {
        alert("Ошибка загрузки билетов. Проверьте, что текст PDF вставлен корректно.");
        return;
    }

    const ticket = ticketsData[Math.floor(Math.random() * ticketsData.length)];
    testSet = ticket.questions;
    document.getElementById('t-info').innerText = "БИЛЕТ №" + ticket.id;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    renderQ();
}

function renderQ() {
    const data = testSet[currentQ];
    document.getElementById('q-num').innerText = currentQ + 1;
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('bar').style.width = ((currentQ + 1) * 10) + '%';
    const list = document.getElementById('ans-list');
    list.innerHTML = '';

    data.answers.forEach((txt, i) => {
        const btn = document.createElement('button');
        btn.className = "ans-btn";
        btn.innerText = txt;
        btn.onclick = () => {
            document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

            if (data.correct.includes(i)) {
                btn.classList.add('correct-highlight');
                score++;
            } else {
                document.getElementById('main-body').classList.add('flash-red');
                setTimeout(() => document.getElementById('main-body').classList.remove('flash-red'), 300);
                btn.classList.add('wrong-highlight');
                data.correct.forEach(idx => {
                    document.querySelectorAll('.ans-btn')[idx].classList.add('correct-highlight');
                });
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < 10) renderQ(); else finish();
            }, 1000);
        };
        list.appendChild(btn);
    });
}

function finish() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('res-screen').classList.remove('hidden');
    const win = score >= 8;
    document.getElementById('res-score').innerText = score + "/10";
    document.getElementById('res-status').innerText = win ? "АТТЕСТОВАН" : "НЕ СДАНО";
    document.getElementById('res-status').style.color = win ? "#16a34a" : "#dc2626";
    document.getElementById('res-icon').innerText = win ? "✅" : "⚠️";
    document.getElementById('res-name').innerText = uName;
    document.getElementById('res-group').innerText = uGroup;
    document.getElementById('res-id').innerText = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('res-date').innerText = new Date().toLocaleDateString();
}
</script>
