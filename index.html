<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аттестация ГПК (30 билетов)</title>
    <style>
    body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; text-align: center; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { color: #0056b3; font-size: 24px; margin-bottom: 5px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    /* Основной стиль для всех кнопок (кроме .ans-btn) */
    button:not(.ans-btn) { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:not(.ans-btn):active { background: #004494; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hidden { display: none; }
    /* Стили для кнопок-ответов */
    .ans-btn { background: #f8fafc; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; width: 100%; text-align: left; border-radius: 10px; cursor: pointer; color: #1e293b; }
    .ans-btn:hover:not(:disabled) { border-color: #0056b3; background: #ebf4ff; color: #1e293b; }
    .progress-bar { background: #e0e6ed; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
    .progress-fill { background: #0056b3; height: 100%; width: 0%; transition: 0.3s; }
    #res-score { font-size: 60px; font-weight: bold; color: #0056b3; margin: 20px 0; }
    .flash-red { background: #fee2e2 !important; transition: 0.3s; }
    .correct-highlight { background-color: #bbf7d0 !important; border-color: #22c55e !important; color: #1e293b !important; }
    .wrong-highlight { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #1e293b !important; }
</style>
</head>
<body id="main-body">

<div class="container">
    <header>
        <div style="background: white; display: inline-block; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
            <b style="color: #0056b3; font-size: 20px;">ГПК</b>
        </div>
        <h1>Глазовский политехнический колледж</h1>
        <p style="color: #666; font-size: 12px; letter-spacing: 1px; margin-top: 5px;">АТТЕСТАЦИЯ: 2 ГРУППА ЭБ</p>
    </header>

    <!-- ЭКРАН 1: ВХОД -->
    <div id="auth-screen" class="card">
        <h2 style="font-size: 18px; margin-bottom: 20px;">Идентификация студента</h2>
        <input type="text" id="s-name" placeholder="Фамилия Имя Отчество">
        <input type="text" id="s-group" placeholder="Номер группы (напр. Э-21)">
        <button onclick="startQuiz()">ПОЛУЧИТЬ БИЛЕТ</button>
        <p style="color: #999; font-size: 10px; margin-top: 15px;">30 БИЛЕТОВ • 300 ВОПРОСОВ • 2026</p>
    </div>

    <!-- ЭКРАН 2: ТЕСТ -->
    <div id="quiz-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; font-weight: bold;">
            <span id="t-info">БИЛЕТ №1</span>
            <span>ВОПРОС <span id="q-num">1</span>/10</span>
        </div>
        <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        <div class="card"><p id="q-text" style="font-size: 18px; font-weight: bold; line-height: 1.4;"></p></div>
        <div id="ans-list"></div>
    </div>

    <!-- ЭКРАН 3: РЕЗУЛЬТАТ -->
    <div id="res-screen" class="hidden card" style="border-top: 8px solid #0056b3;">
        <div id="res-icon" style="font-size: 50px; margin-bottom: 10px;"></div>
        <h2 id="res-status" style="margin: 0; font-style: italic;"></h2>
        <div id="res-score">0/10</div>
        <div style="text-align: left; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 20px;">
            <p style="margin: 5px 0; font-size: 14px;"><b>Студент:</b> <span id="res-name"></span></p>
            <p style="margin: 5px 0; font-size: 14px;"><b>Группа:</b> <span id="res-group"></span></p>
            <p style="margin: 15px 0 0 0; color: #999; font-size: 10px;">ID: <span id="res-id"></span> | <span id="res-date"></span></p>
        </div>
        <button style="background: #eee; color: #666;" onclick="location.reload()">НОВАЯ ПОПЫТКА</button>
        <p style="font-size: 10px; color: #999; margin-top: 15px; font-weight: bold;">СДЕЛАЙТЕ СКРИНШОТ ДЛЯ ОТЧЕТА</p>
    </div>
</div>

<script>
// --------------------------------------------------------------
// ВОПРОСЫ ИЗ ВАШЕГО PDF (скопированы и вставлены сюда)
// --------------------------------------------------------------
// --------------------------------------------------------------
// ГОТОВЫЕ БИЛЕТЫ (на основе вашего PDF)
// --------------------------------------------------------------
const ticketsData = [
  // БИЛЕТ 1
  {
    id: 1,
    questions: [
      {
        q: "Какие буквенные и цветовые обозначения должны иметь шины при переменном трехфазном токе?",
        answers: [
          "Шины фазы A - желтым, фазы B - зеленым, фазы C - красным цветом",
          "Шины фазы A - зеленым, фазы B - желтым, фазы C - красным цветом",
          "Шины фазы A - красным, фазы B - белым, фазы C - синим цветом",
          "Шины фазы A - голубым, фазы B - белым, фазы C - красным цветом"
        ],
        correct: [0]
      },
      {
        q: "Если коэффициент трансформации больше единицы, то этот трансформатор принято считать:",
        answers: [
          "Повышающим",
          "Понижающим",
          "Возрастающим",
          "Убывающим"
        ],
        correct: [1]
      },
      {
        q: "Какие помещения относятся к электропомещениям?",
        answers: [
          "Помещения, в которых находится электрооборудование с напряжением выше 220 В",
          "Помещения или отгороженные (например, сетками) части помещения, в которых расположено электрооборудование, доступное только для квалифицированного обслуживающего персонала",
          "Любые помещения с электрооборудованием мощностью выше 10 кВт",
          "Помещения, в которых находятся любые электроустановки"
        ],
        correct: [1]
      },
      {
        q: "Как часто проводится проверка знаний по электробезопасности для электротехнического персонала?",
        answers: [
          "Не реже одного раза в год",
          "Не реже одного раза в полгода",
          "Не реже одного раза в три года",
          "Не реже одного раза в пять лет"
        ],
        correct: [0]
      },
      {
        q: "Кто может являться ответственным за безопасное ведение работ?",
        answers: [
          "Ответственный руководитель работ, допускающий, производитель работ, наблюдающий, члены бригады",
          "Выдающий наряд, отдающий распоряжение, утверждающий перечень работ, выполняемых в порядке текущей эксплуатации, ответственный руководитель работ, допускающий, производитель работ, наблюдающий",
          "Ответственный руководитель работ, допускающий, производитель работ, наблюдающий",
          "Выдающий наряд, отдающий распоряжение, утверждающий перечень работ, выполняемых в порядке текущей эксплуатации, ответственный руководитель работ, допускающий, производитель работ, наблюдающий, члены бригады"
        ],
        correct: [3]
      },
      {
        q: "В какой последовательности необходимо выполнять технические мероприятия, обеспечивающие безопасность работ со снятием напряжения?",
        answers: [
          "Произвести необходимые отключения, проверить отсутствие напряжения на токоведущих частях, установить заземление, вывесить запрещающие и указательные плакаты",
          "Вывесить запрещающие и указательные плакаты, произвести необходимые отключения, проверить отсутствие напряжения на токоведущих частях, установить заземление",
          "Произвести необходимые отключения, вывесить запрещающие плакаты, проверить отсутствие напряжения на токоведущих частях, установить заземление, вывесить указательные плакаты",
          "Произвести необходимые отключения, вывесить запрещающие и указательные плакаты, установить заземление, проверить отсутствие напряжения на токоведущих частях"
        ],
        correct: [2]
      },
      {
        q: "Что называется защитным заземлением?",
        answers: [
          "Преднамеренное электрическое соединение какой-либо точки сети, электроустановки или оборудования с заземляющим устройством",
          "Заземление, выполняемое в целях электробезопасности",
          "Заземление точки или точек токоведущих частей электроустановки, выполняемое для обеспечения работы электроустановки (не в целях электробезопасности)"
        ],
        correct: [0, 1]   // два правильных ответа
      },
      {
        q: "В каких электроустановках при пользовании указателем напряжения необходимо надевать диэлектрические перчатки?",
        answers: [
          "В электроустановках напряжением выше 380 В",
          "В электроустановках напряжением до 1000 В",
          "В электроустановках напряжением выше 1000 В"
        ],
        correct: [2]
      },
      {
        q: "В каких электроустановках применяют диэлектрические галоши?",
        answers: [
          "В электроустановках напряжением до 1000 В",
          "В электроустановках напряжением свыше 1000 В",
          "В электроустановках напряжением до 10000 В",
          "Во всех электроустановках"
        ],
        correct: [0]
      },
      {
        q: "Что необходимо сделать в первую очередь при поражении человека электрическим током?",
        answers: [
          "Позвонить в скорую помощь",
          "Произвести отключение электрического тока",
          "Оттащить пострадавшего за одежду не менее чем на 8 метров от места касания проводом земли или от оборудования, находящегося под напряжением",
          "Приступить к реанимации пострадавшего"
        ],
        correct: [1]
      }
    ]
  }
  // ПОСЛЕ ЭТОЙ СТРОКИ можно будет добавлять следующие билеты (БИЛЕТ 2, 3 и т.д.)
];

// --------------------------------------------------------------
// ЛОГИКА ТЕСТА
// --------------------------------------------------------------
let testSet = [], currentQ = 0, score = 0, uName = "", uGroup = "";

function startQuiz() {
    uName = document.getElementById('s-name').value.trim();
    uGroup = document.getElementById('s-group').value.trim();
    if (uName.length < 3 || uGroup.length < 2) return alert("Введите ФИО и группу!");

    if (!ticketsData.length) {
        alert("Ошибка загрузки билетов. Проверьте, что текст PDF вставлен корректно.");
        return;
    }

    const ticket = ticketsData[Math.floor(Math.random() * ticketsData.length)];
    testSet = ticket.questions;
    document.getElementById('t-info').innerText = "БИЛЕТ №" + ticket.id;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    renderQ();
}

function renderQ() {
    const data = testSet[currentQ];
    document.getElementById('q-num').innerText = currentQ + 1;
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('bar').style.width = ((currentQ + 1) * 10) + '%';
    const list = document.getElementById('ans-list');
    list.innerHTML = '';

    data.answers.forEach((txt, i) => {
        const btn = document.createElement('button');
        btn.className = "ans-btn";
        btn.innerText = txt;
        btn.onclick = () => {
            document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

            if (data.correct.includes(i)) {
                btn.classList.add('correct-highlight');
                score++;
            } else {
                document.getElementById('main-body').classList.add('flash-red');
                setTimeout(() => document.getElementById('main-body').classList.remove('flash-red'), 300);
                btn.classList.add('wrong-highlight');
                data.correct.forEach(idx => {
                    document.querySelectorAll('.ans-btn')[idx].classList.add('correct-highlight');
                });
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < 10) renderQ(); else finish();
            }, 1000);
        };
        list.appendChild(btn);
    });
}

function finish() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('res-screen').classList.remove('hidden');
    const win = score >= 8;
    document.getElementById('res-score').innerText = score + "/10";
    document.getElementById('res-status').innerText = win ? "АТТЕСТОВАН" : "НЕ СДАНО";
    document.getElementById('res-status').style.color = win ? "#16a34a" : "#dc2626";
    document.getElementById('res-icon').innerText = win ? "✅" : "⚠️";
    document.getElementById('res-name').innerText = uName;
    document.getElementById('res-group').innerText = uGroup;
    document.getElementById('res-id').innerText = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('res-date').innerText = new Date().toLocaleDateString();
}
</script>
</body>
</html>
